<!-- OneSignal SDK (nur EINMAL!) -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
/************************************************
 * OneSignal Init + PID Handling (stabil)
 ************************************************/
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function (OneSignal) {

    try {
        await OneSignal.init({
            appId: "fe30b2b7-1dcb-43e9-8e39-b1870d1a6815",
            serviceWorkerParam: { scope: "/sportschuetzen/" },
            serviceWorkerPath: "OneSignalSDKWorker.js",
            autoRegister: false,
            notifyButton: { enable: true }
        });

        console.log("OneSignal Init fertig");

        // ---- PID Handling ----
        const params = new URLSearchParams(window.location.search);
        let pid = params.get("pid") || localStorage.getItem("sportschuetzen_pid");

        if (!pid) {
            console.log("Keine PID vorhanden");
            return;
        }

        localStorage.setItem("sportschuetzen_pid", pid);

        if (OneSignal.User.externalId !== pid) {
            const paddedPid = String(pid).padStart(6, '0');
            await OneSignal.login(paddedPid);
            console.log("Login mit PID:", paddedPid);
        }

        const permission = OneSignal.Notifications.permission;

        if (permission === "default") {
            await OneSignal.Notifications.requestPermission();
        }

    } catch (err) {
        console.error("OneSignal Fehler:", err);
    }
});

/************************************************
 * ZENTRALE APP-RESUME LOGIK
 ************************************************/
(function () {

    let lastResume = 0;
    const MIN_INTERVAL = 1500;

    function fireResume(source) {
        const now = Date.now();
        if (now - lastResume < MIN_INTERVAL) return;
        lastResume = now;

        console.log("📲 App Resume:", source);

        // Event für Hauptseite
        document.dispatchEvent(new CustomEvent("app:resume"));

        // Resume an alle iFrames senden
        document.querySelectorAll("iframe").forEach(iframe => {
            iframe.contentWindow?.postMessage(
                { type: "app:resume", source, ts: now },
                "*"
            );
        });
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            fireResume("visibility");
        }
    });

    window.addEventListener("pageshow", e => {
        if (e.persisted) {
            fireResume("pageshow");
        }
    });

    window.addEventListener("focus", () => {
        fireResume("focus");
    });

})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
